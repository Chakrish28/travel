<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discover Destinations – Buddy Hub</title>
  <meta name="description" content="Discover famous places, travel guides, and suggested itineraries for the world's most popular destinations.">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    /* ============================================
       DISCOVER PAGE STYLES
       ============================================ */
    .discover-hero {
      background: var(--navy-gradient);
      border-radius: var(--radius-lg);
      padding: 3rem 2.5rem;
      margin-bottom: 2rem;
      text-align: center;
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .discover-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 80%, rgba(250,158,27,0.15) 0%, transparent 50%),
                  radial-gradient(circle at 80% 20%, rgba(250,158,27,0.1) 0%, transparent 50%);
    }
    .discover-hero h1 {
      font-family: var(--font-heading);
      font-size: 2.5rem;
      font-weight: 900;
      position: relative;
      margin-bottom: 0.5rem;
    }
    .discover-hero p {
      color: rgba(255,255,255,0.7);
      font-size: 1rem;
      position: relative;
      max-width: 600px;
      margin: 0 auto;
    }
    .discover-search {
      display: flex;
      gap: 0.75rem;
      max-width: 500px;
      margin: 1.5rem auto 0;
      position: relative;
    }
    .discover-search input {
      flex: 1;
      padding: 14px 20px 14px 44px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: var(--radius-pill);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 14px;
      font-family: var(--font-body);
      outline: none;
      backdrop-filter: blur(10px);
      transition: var(--transition);
    }
    .discover-search input::placeholder { color: rgba(255,255,255,0.5); }
    .discover-search input:focus { border-color: var(--primary); background: rgba(255,255,255,0.15); }
    .discover-search .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }

    /* Destination Grid */
    .dest-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    /* Destination Card */
    .dest-card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--card-border);
      box-shadow: var(--card-shadow);
      transition: var(--transition);
      cursor: pointer;
    }
    .dest-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--card-shadow-hover);
      border-color: var(--primary);
    }

    .dest-card-hero {
      height: 180px;
      display: flex;
      align-items: flex-end;
      padding: 1.25rem;
      position: relative;
      overflow: hidden;
    }
    .dest-card-emoji {
      position: absolute;
      top: 12px;
      right: 16px;
      font-size: 2rem;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }
    .dest-card-overlay h3 {
      font-family: var(--font-heading);
      font-size: 1.4rem;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .dest-card-overlay p {
      color: rgba(255,255,255,0.8);
      font-size: 0.85rem;
      font-weight: 600;
    }
    .dest-card-body {
      padding: 1.25rem;
    }
    .dest-tagline {
      font-family: var(--font-elegant);
      font-style: italic;
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 0.75rem;
    }
    .dest-meta {
      display: flex;
      gap: 1rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }
    .dest-meta i { color: var(--primary); margin-right: 4px; }
    .dest-places-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .dest-place-tag {
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      font-size: 0.7rem;
      font-weight: 700;
      background: rgba(250,158,27,0.08);
      color: var(--primary);
      border: 1px solid rgba(250,158,27,0.15);
    }
    .dest-place-tag.more {
      background: var(--bg-section);
      color: var(--text-muted);
      border-color: var(--card-border);
    }
    .dest-place-tag i { margin-right: 3px; font-size: 0.65rem; }

    /* Detail View */
    .dest-detail-hero {
      border-radius: var(--radius-lg);
      padding: 3rem 2rem;
      text-align: center;
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
    }
    .dest-detail-hero-content {
      position: relative;
      z-index: 1;
    }
    .dest-detail-hero h1 {
      font-family: var(--font-heading);
      font-size: 2.8rem;
      font-weight: 900;
      color: #fff;
      margin: 0.5rem 0 0.25rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    .dest-detail-hero p {
      color: rgba(255,255,255,0.8);
      font-size: 1rem;
      font-weight: 600;
    }

    .dest-detail-info {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    .dest-info-chip {
      padding: 10px 18px;
      border-radius: var(--radius-pill);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      font-size: 0.85rem;
      color: var(--text);
      box-shadow: var(--card-shadow);
    }
    .dest-info-chip i { color: var(--primary); margin-right: 6px; }

    /* Places Grid */
    .places-grid {
      display: grid;
      gap: 1rem;
    }
    .place-item {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 1rem;
      background: var(--bg-section);
      border-radius: var(--radius-md);
      transition: var(--transition);
      border-left: 4px solid transparent;
    }
    .place-item:hover {
      border-left-color: var(--primary);
      transform: translateX(4px);
    }
    .place-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(250,158,27,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-size: 1rem;
      flex-shrink: 0;
    }
    .place-item h4 {
      font-family: var(--font-heading);
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 0.25rem;
    }
    .place-item p {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* Itinerary Timeline */
    .itinerary-timeline {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      position: relative;
      padding-left: 1.5rem;
    }
    .itinerary-timeline::before {
      content: '';
      position: absolute;
      left: 0;
      top: 8px;
      bottom: 8px;
      width: 3px;
      background: linear-gradient(to bottom, var(--primary), rgba(250,158,27,0.2));
      border-radius: 2px;
    }
    .itinerary-day {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      position: relative;
    }
    .itinerary-day::before {
      content: '';
      position: absolute;
      left: -1.5rem;
      top: 8px;
      width: 13px;
      height: 13px;
      background: var(--primary);
      border-radius: 50%;
      border: 3px solid var(--card-bg);
      transform: translateX(-5px);
      z-index: 1;
    }
    .itinerary-day-badge {
      background: var(--primary);
      color: #fff;
      padding: 4px 12px;
      border-radius: var(--radius-pill);
      font-size: 0.75rem;
      font-weight: 800;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .itinerary-day-content {
      flex: 1;
      padding: 0.75rem 1rem;
      background: var(--bg-section);
      border-radius: var(--radius-md);
    }
    .itinerary-day-content h4 {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--dark);
      margin-bottom: 0.25rem;
    }
    .itinerary-day-content p {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* Detail Grid */
    .dest-detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-top: 1.5rem;
    }
    @media (max-width: 768px) { .dest-detail-grid { grid-template-columns: 1fr; } }

    .dest-food-list, .dest-tips-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .dest-food-list li, .dest-tips-list li {
      font-size: 0.9rem;
      color: var(--text);
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--card-border);
      display: flex;
      align-items: flex-start;
    }
    .dest-food-list li:last-child, .dest-tips-list li:last-child { border-bottom: none; }

    /* CTA */
    .dest-cta {
      text-align: center;
      padding: 2.5rem;
      margin-top: 2rem;
      background: var(--bg-section);
      border-radius: var(--radius-lg);
      border: 2px dashed var(--card-border);
    }
    .dest-cta p {
      font-size: 1.1rem;
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/dashboard.html" class="logo">BUDDY<span>HUB</span></a>
    <ul class="nav-links" id="navLinks">
      <li><a href="/dashboard.html">Dashboard</a></li>
      <li><a href="/matches.html">Explore</a></li>
      <li><a href="/my-trips.html">My Trips</a></li>
      <li><a href="/chat.html">Chat</a></li>
      <li><a href="/experiences.html">Experiences</a></li>
      <li><a href="/discover.html" class="active">Discover</a></li>
      <li><button class="theme-toggle" onclick="toggleTheme()"><i class="fa-solid fa-moon" id="themeIcon"></i></button></li>
      <li><a href="/profile.html"><img class="nav-avatar" id="navAvatar" src="https://ui-avatars.com/api/?name=U&background=fa9e1b&color=fff" alt=""></a></li>
      <li><a href="#" onclick="logout()" style="color:#ef4444"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
    </ul>
    <button class="hamburger" onclick="document.getElementById('navLinks').classList.toggle('open')"><i class="fa-solid fa-bars"></i></button>
  </nav>

  <div class="page-wrapper">
    <div class="page-container">
      <!-- Hero -->
      <div class="discover-hero animate-in">
        <h1><i class="fa-solid fa-compass" style="color:var(--primary)"></i> Discover Destinations</h1>
        <p>Explore famous places, travel guides, and plan what to visit at the world's most incredible destinations</p>
        <div class="discover-search">
          <i class="fa-solid fa-search search-icon"></i>
          <input type="text" id="destSearch" placeholder="Search destinations..." oninput="handleSearch()">
        </div>
      </div>

      <!-- Grid Section -->
      <div id="destGridSection">
        <div id="destGrid" class="dest-grid"></div>
      </div>

      <!-- Detail Section -->
      <div id="destDetail" style="display:none"></div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/js/theme.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/discover.js"></script>
</body>
</html>
