<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buddy Hub - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;
    height:100vh;
    display:flex;
    justify-content:flex-end;
    align-items:center;
    background: url('https://wallpapers.com/images/hd/travel-laptop-xq0diink72r9jl77.jpg') no-repeat center center/cover;
    overflow:hidden;
}

@keyframes slideIn {
    from{ transform:translateX(100px); opacity:0; }
    to{ transform:translateX(0); opacity:1; }
}

.container{
    width:950px;
    height:550px;
    margin-right:20%;
    display:flex;
    border-radius:20px 0 0 20px;
    overflow:hidden;
    box-shadow:-25px 35px 80px rgba(0,0,0,0.7);
    animation:slideIn 1s ease forwards;
}

.left{
    flex:1;
    background:linear-gradient(to top, rgba(0,0,0,0.75), rgba(0,0,0,0.3));
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:flex-start;
    padding:60px;
    color:white;
    backdrop-filter:blur(4px);
}

.left h1{
    font-family:'Montserrat', sans-serif;
    font-size:46px;
    font-weight:800;
    letter-spacing:3px;
}

.left p{
    margin-top:20px;
    font-size:15px;
    opacity:0.9;
    line-height:1.6;
}

.right{
    flex:1;
    background:rgba(10, 45, 78, 0.92);
    backdrop-filter:blur(12px);
    padding:60px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    color:white;
}

.right h2{
    font-size:26px;
    margin-bottom:30px;
    text-align:center;
    font-weight:600;
}

.form-group{
    margin-bottom:18px;
}

.form-group input{
    width:100%;
    padding:13px 15px;
    border-radius:8px;
    border:none;
    outline:none;
    font-size:14px;
    font-family:'Poppins', sans-serif;
    transition:0.3s;
}

.form-group input:focus{
    box-shadow:0 0 12px #ff6b35;
    transform:scale(1.02);
}

.login-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#ff6b35;
    color:white;
    font-size:15px;
    font-family:'Poppins', sans-serif;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    margin-top:5px;
}

.login-btn:hover{
    background:#ff3c00;
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

.login-btn:disabled{
    background:#888;
    cursor:not-allowed;
    transform:none;
}

.error-msg{
    background:rgba(239,68,68,0.2);
    border:1px solid rgba(239,68,68,0.5);
    color:#fca5a5;
    padding:10px 14px;
    border-radius:8px;
    margin-bottom:15px;
    font-size:13px;
    display:none;
    animation: shake 0.4s ease;
}

@keyframes shake {
    0%,100%{ transform:translateX(0); }
    25%{ transform:translateX(-6px); }
    75%{ transform:translateX(6px); }
}

.bottom-text{
    margin-top:20px;
    text-align:center;
    font-size:14px;
}

.bottom-text a{
    color:#ff6b35;
    text-decoration:none;
    font-weight:500;
}

.bottom-text a:hover{
    text-decoration:underline;
}

.back-home-link {
    margin-top: 15px;
    display: block;
    color: rgba(255, 255, 255, 0.6) !important;
    font-size: 13px;
    transition: 0.3s;
}

.back-home-link:hover {
    color: #fff !important;
}

@media(max-width:900px){
    body{ justify-content:center; }
    .container{ flex-direction:column; width:95%; height:auto; margin-right:0; border-radius:20px; }
    .left, .right{ width:100%; height:auto; padding:40px; }
}
</style>
</head>
<body>

<div class="container">
    <div class="left">
        <h1>WELCOME</h1>
        <p>Log in to continue your journey. Find companions, manage trips, and explore safely with Buddy Hub.</p>
    </div>

    <div class="right">
        <h2>Login to Your Account</h2>
        <div class="error-msg" id="errorMsg"></div>
        <div class="form-group">
            <input type="email" id="email" placeholder="Email Address" required>
        </div>
        <div class="form-group">
            <input type="password" id="password" placeholder="Password" required onkeydown="if(event.key==='Enter')handleLogin()">
        </div>
        <button class="login-btn" id="loginBtn" onclick="handleLogin()">Login</button>

        <div class="bottom-text">
            Don't have an account? <a href="/register.html">Register</a>
            <a href="/" class="back-home-link"><i class="fa-solid fa-house"></i> Back to Home</a>
        </div>
    </div>
</div>

<script src="/js/auth.js"></script>
</body>
</html>
